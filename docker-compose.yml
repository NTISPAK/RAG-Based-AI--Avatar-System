version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-avatar-network

  # RAG Backend
  rag-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
    volumes:
      - ./documents:/app/documents
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-avatar-network
    restart: unless-stopped

  # LiveTalking Frontend
  livetalking:
    build:
      context: ./LiveTalking
      dockerfile: Dockerfile.new
    container_name: livetalking
    ports:
      - "8010:8010"
    environment:
      - RAG_BACKEND_URL=http://rag-backend:8000
      - BATCH_SIZE=2
      - AVATAR_ID=wav2lip256_avatar1
      - REF_FILE=en-US-JennyNeural
    volumes:
      - ./LiveTalking/models:/app/models
      - ./LiveTalking/data:/app/data
    depends_on:
      rag-backend:
        condition: service_healthy
    networks:
      - ai-avatar-network
    restart: unless-stopped
    # Uncomment below for GPU support (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  qdrant_storage:
    driver: local

networks:
  ai-avatar-network:
    driver: bridge
