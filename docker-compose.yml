

# NOTE: This compose covers Qdrant + RAG backend only.
# The avatar server (port 8010) requires GPU, ffmpeg, and large model files.
# Run it natively: cd backend && python app.py ...

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-avatar-network

  rag-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - COLLECTION_NAME=${COLLECTION_NAME:-policy_docs}
      - ENABLE_TRANSLATION=${ENABLE_TRANSLATION:-true}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - SUPPORTED_LANGUAGES=${SUPPORTED_LANGUAGES:-en,ur}
    volumes:
      - ./backend/rag/documents:/app/rag/documents:ro
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-avatar-network
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local

networks:
  ai-avatar-network:
    driver: bridge
